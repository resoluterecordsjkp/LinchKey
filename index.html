<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading LinchKey…</title>
</head>
<body>
<p>Loading the full LinchKey prototype…</p>

<script>
(async function () {
  try {
    if ("serviceWorker" in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(
        registrations.map(registration => registration.unregister())
      );
    }

    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(key => caches.delete(key)));
    }

    const response = await fetch(
      "./LinchKey_index_v2.0_FULL_with_Why_CODE-1.txt?v=20260720-3",
      { cache: "no-store" }
    );

    if (!response.ok) {
      throw new Error("File could not be loaded: " + response.status);
    }

    const fullHtml = await response.text();

    document.open();
    document.write(fullHtml);
    document.close();
  } catch (error) {
    document.body.innerHTML =
      "<h1>LinchKey could not load</h1>" +
      "<p>" + error.message + "</p>" +
      "<p>Check that the full text file name matches exactly.</p>";
  }
})();
</script>
</body>
</html>
